services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - .env.local
    environment:
      - API_PORT=8080
      - OLLAMA_URL=http://host.docker.internal:11434
      - REDIS_URL=redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    develop:
      watch:
        - action: rebuild
          path: ./backend
